name: wohlbekannt-dev

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ../backend:/var/www/app:cached
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: dev

  web:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ../backend:/var/www/app:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: wohlbekannt
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotenberg:
    image: gotenberg/gotenberg:8
    # Chromium-based HTML -> PDF rendering for quotes & invoices
    command:
      - "gotenberg"
      - "--chromium-disable-web-security"

  # Vite dev server for the Vue SPA (proxies /api -> web:80)
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app:cached
    environment:
      # Inside the container "web" is the nginx service; the browser still hits
      # the SPA at :5173 and Vite proxies /api to the backend.
      VITE_API_URL: http://web:80

volumes:
  db_data:
